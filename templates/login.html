{% extends "base.html" %}
{% block title %}Sign in — Launchpad{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card glass">
    <h1>Welcome back.</h1>
    <div class="sub">Sign in to browse, upload, and discuss projects.</div>

    {% if google_oauth_enabled %}
    <a href="{{ url_for('google_login') }}" class="btn-google" style="margin-bottom: 18px;">
      <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l6-6C34.6 6 29.6 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.2-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 19 13 24 13c3.1 0 5.9 1.2 8 3.1l6-6C34.6 6 29.6 4 24 4 16.1 4 9.2 8.4 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.5 0 10.4-1.8 14.1-4.9l-6.5-5.5c-2 1.5-4.6 2.4-7.6 2.4-5.3 0-9.7-3.4-11.3-8.1l-6.6 5.1C9.1 39.6 16 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.5l6.5 5.5C41.5 35.6 44 30.2 44 24c0-1.2-.1-2.4-.4-3.5z"/></svg>
      Continue with Google
    </a>
    <div class="auth-divider">or sign in with email</div>
    {% endif %}

    <form method="post">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ form.get('email', '') }}" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn-primary">Sign In</button>
    </form>
    <div class="auth-switch">No account yet? <a href="{{ url_for('register') }}">Create one</a></div>
  </div>
</div>
{% endblock %}
