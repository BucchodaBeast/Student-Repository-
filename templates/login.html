{% extends "base.html" %}
{% block title %}Sign in — Launchpad{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card glass">
    <h1>Welcome back.</h1>
    <div class="sub">Sign in to browse, upload, and discuss projects.</div>
    <form method="post">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ form.get('email', '') }}" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn-primary">Sign In</button>
    </form>
    <div class="auth-switch">No account yet? <a href="{{ url_for('register') }}">Create one</a></div>
  </div>
</div>
{% endblock %}
